<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgilConsultants | Christian Honl — IT-Turnaround & KI-Integration</title>
<meta name="description" content="Ihr IT-Projekt brennt? Christian Honl rettet festgefahrene Projekte und integriert KI wo andere scheitern. 25+ Jahre Erfahrung. Bad Homburg.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #00A19A;
  --teal-dim: rgba(0,161,154,0.12);
  --teal-glow: rgba(0,161,154,0.25);
  --orange: #F7941D;
  --orange-dim: rgba(247,148,29,0.12);
  --bg: #0D0F14;
  --bg2: #131720;
  --bg3: #1A1F2E;
  --surface: #1E2435;
  --border: rgba(255,255,255,0.07);
  --text: #E8ECF4;
  --muted: #7A8299;
  --light: #B8C0D4;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(13,15,20,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}

.nav-logo span { color: var(--teal); }

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--text); }

.nav-cta {
  background: var(--teal);
  color: #fff !important;
  padding: 10px 22px;
  border-radius: 6px;
  font-weight: 600 !important;
  transition: background 0.2s, transform 0.15s !important;
}

.nav-cta:hover { background: #00b8b0 !important; transform: translateY(-1px); }

.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 140px 48px 80px;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(0,161,154,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(247,148,29,0.05) 0%, transparent 60%);
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 820px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal-dim);
  border: 1px solid rgba(0,161,154,0.3);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--teal);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 28px;
}

.hero h1 .accent { color: var(--teal); }
.hero h1 .accent-o { color: var(--orange); }

.hero-sub {
  font-size: 1.15rem;
  color: var(--light);
  max-width: 580px;
  line-height: 1.7;
  margin-bottom: 48px;
  font-weight: 400;
}

.hero-actions {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  background: var(--teal);
  color: #fff;
  padding: 16px 36px;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
  letter-spacing: 0.01em;
}

.btn-primary:hover { background: #00b8b0; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,161,154,0.35); }

.btn-secondary {
  background: transparent;
  color: var(--text);
  padding: 16px 36px;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 500;
  text-decoration: none;
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.btn-secondary:hover { border-color: var(--teal); color: var(--teal); }

.hero-stats {
  position: absolute;
  right: 80px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 28px;
  text-align: center;
  min-width: 160px;
}

.stat-number {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.75rem;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.04em;
}

section { position: relative; }

.section-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 100px 48px;
}

.section-label {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 16px;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 20px;
}

.section-sub {
  font-size: 1.05rem;
  color: var(--light);
  max-width: 600px;
  line-height: 1.7;
}

.problem { background: var(--bg2); }

.problem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: center;
  margin-top: 64px;
}

.problem-stat {
  text-align: center;
  padding: 48px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}

.problem-stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--orange), transparent);
}

.problem-stat-number {
  font-family: 'Syne', sans-serif;
  font-size: 4.5rem;
  font-weight: 800;
  color: var(--orange);
  line-height: 1;
  margin-bottom: 12px;
}

.problem-stat-text {
  font-size: 1rem;
  color: var(--light);
  line-height: 1.6;
}

.problem-points {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.problem-point {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 20px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: border-color 0.2s;
}

.problem-point:hover { border-color: rgba(0,161,154,0.3); }

.problem-point-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--orange-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.problem-point-text { font-size: 0.95rem; color: var(--light); line-height: 1.6; }
.problem-point-text strong { color: var(--text); }

.beweise { background: var(--bg); }

.cases {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-top: 64px;
}

.case-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}

.case-card:hover { transform: translateY(-4px); border-color: rgba(0,161,154,0.3); }

.case-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--teal), transparent);
}

.case-client {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 16px;
}

.case-headline {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 16px;
}

.case-desc { font-size: 0.95rem; color: var(--light); line-height: 1.7; margin-bottom: 28px; }

.case-result {
  display: flex;
  gap: 24px;
}

.result-number {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--orange);
  line-height: 1;
}

.result-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

.story { background: var(--bg2); }

.story-timeline {
  position: relative;
  margin-top: 64px;
  padding-left: 32px;
}

.story-timeline::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 2px;
  background: linear-gradient(to bottom, var(--teal), var(--orange), var(--teal));
}

.timeline-item {
  position: relative;
  padding: 0 0 48px 40px;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -5px; top: 8px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--teal);
  border: 2px solid var(--bg2);
  box-shadow: 0 0 0 3px var(--teal-glow);
}

.timeline-year {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.timeline-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.timeline-text { font-size: 0.95rem; color: var(--light); line-height: 1.7; max-width: 560px; }

.timeline-item.highlight .timeline-title { color: var(--orange); }
.timeline-item.highlight::before { background
